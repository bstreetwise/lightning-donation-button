<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Our Work</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }

    .donation-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 48px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .bolt-icon {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
    }

    h1 {
      color: #fff;
      font-size: 28px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .lightning-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(135deg, #f7931a 0%, #ffb347 100%);
      color: #fff;
      border: none;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      width: 100%;
    }

    .lightning-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(247, 147, 26, 0.4);
    }

    .lightning-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .lightning-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .lightning-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .amount-options {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .amount-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .amount-btn:hover,
    .amount-btn.active {
      background: rgba(247, 147, 26, 0.3);
      border-color: #f7931a;
    }

    .custom-amount {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .custom-amount input {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    .custom-amount input:focus {
      border-color: #f7931a;
    }

    .custom-amount input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .sats-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 14px;
      margin-top: 16px;
      padding: 12px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 8px;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .invoice-display {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      word-break: break-all;
      font-family: monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      display: none;
    }

    .invoice-display.visible {
      display: block;
    }

    .invoice-display .label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .qr-container {
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      display: inline-block;
    }

    .qr-container canvas {
      display: block;
    }

    .invoice-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .copy-btn, .open-wallet-btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .copy-btn.copied {
      background: rgba(76, 175, 80, 0.3);
      border-color: #4caf50;
    }

    .open-wallet-btn {
      background: #f7931a;
      color: #fff;
    }

    .open-wallet-btn:hover {
      background: #e6850a;
    }

    .amount-display {
      color: #f7931a;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .payment-status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .payment-status.visible {
      display: flex;
    }

    .payment-status.pending {
      background: rgba(255, 193, 7, 0.15);
      color: #ffc107;
      border: 1px solid rgba(255, 193, 7, 0.3);
    }

    .payment-status.paid {
      background: rgba(76, 175, 80, 0.15);
      color: #4caf50;
      border: 1px solid rgba(76, 175, 80, 0.3);
    }

    .payment-status.expired {
      background: rgba(255, 107, 107, 0.15);
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .payment-status .status-icon {
      width: 18px;
      height: 18px;
    }

    .status-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .check-icon {
      display: none;
    }

    .payment-status.paid .check-icon {
      display: block;
    }

    .payment-status.paid .status-spinner {
      display: none;
    }

    .refresh-btn {
      background: transparent;
      border: none;
      color: inherit;
      cursor: pointer;
      padding: 4px;
      margin-left: 8px;
      opacity: 0.7;
    }

    .refresh-btn:hover {
      opacity: 1;
    }

    @keyframes successPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes celebrate {
      0% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.1) rotate(-5deg); }
      50% { transform: scale(1.1) rotate(5deg); }
      75% { transform: scale(1.1) rotate(-5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .payment-status.paid {
      animation: successPulse 0.6s ease-in-out;
    }

    .payment-status.paid .bolt-icon-success {
      animation: celebrate 0.8s ease-in-out;
    }

    .expired-actions {
      margin-top: 12px;
      display: none;
    }

    .expired-actions.visible {
      display: flex;
      gap: 8px;
    }

    .new-invoice-btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .new-invoice-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>
  <div class="donation-card">
    <svg class="bolt-icon" viewBox="0 0 24 24" fill="#f7931a">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
    </svg>
    
    <h1>Support Our Work</h1>
    <p>Help us continue building amazing things. Every sat counts!</p>

    <div class="amount-options">
      <button class="amount-btn" data-amount="100">100</button>
      <button class="amount-btn active" data-amount="500">500</button>
      <button class="amount-btn" data-amount="1000">1000</button>
      <button class="amount-btn" data-amount="5000">5000</button>
    </div>

    <div class="custom-amount">
      <input type="number" id="customAmount" placeholder="Custom amount" min="1">
      <span class="sats-label">sats</span>
    </div>

    <button id="donateBtn" class="lightning-btn">
      <svg viewBox="0 0 24 24">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      Donate with Lightning
    </button>

    <div id="errorMsg" class="error-msg"></div>
    
    <div id="invoiceDisplay" class="invoice-display">
      <div class="amount-display"><span id="displayAmount"></span> sats</div>
      <div class="qr-container">
        <canvas id="qrCode"></canvas>
      </div>
      <div class="label">Payment Request</div>
      <div id="invoiceText"></div>
      <div class="invoice-actions">
        <button id="copyBtn" class="copy-btn">Copy</button>
        <button id="openWalletBtn" class="open-wallet-btn">Open Wallet</button>
      </div>
      
      <div id="paymentStatus" class="payment-status pending">
        <span class="status-spinner"></span>
        <svg class="check-icon bolt-icon-success" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span class="status-text">Waiting for payment...</span>
        <button id="refreshStatus" class="refresh-btn" title="Check status">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>

      <div id="expiredActions" class="expired-actions">
        <button id="newInvoiceBtn" class="new-invoice-btn">Generate New Invoice</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    const BLINK_API_URL = 'https://api.blink.sv/graphql';
    const RECIPIENT_WALLET_ID = '';
    const RECIPIENT_USERNAME = 'satsinaction';

    const amountBtns = document.querySelectorAll('.amount-btn');
    const customInput = document.getElementById('customAmount');
    const donateBtn = document.getElementById('donateBtn');
    const errorMsg = document.getElementById('errorMsg');
    const invoiceDisplay = document.getElementById('invoiceDisplay');
    const invoiceText = document.getElementById('invoiceText');
    const displayAmount = document.getElementById('displayAmount');
    const copyBtn = document.getElementById('copyBtn');
    const openWalletBtn = document.getElementById('openWalletBtn');
    const qrCanvas = document.getElementById('qrCode');
    const paymentStatus = document.getElementById('paymentStatus');
    const statusText = paymentStatus.querySelector('.status-text');
    const refreshStatusBtn = document.getElementById('refreshStatus');
    const expiredActions = document.getElementById('expiredActions');
    const newInvoiceBtn = document.getElementById('newInvoiceBtn');
    
    let currentPaymentRequest = '';
    let selectedAmount = 500;
    let statusPollingInterval = null;

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      invoiceDisplay.classList.remove('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    async function resolveWalletId(username) {
      const query = `
        query accountDefaultWallet($username: Username!, $walletCurrency: WalletCurrency) {
          accountDefaultWallet(username: $username, walletCurrency: $walletCurrency) {
            id
          }
        }
      `;

      const response = await fetch(BLINK_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query,
          variables: { username, walletCurrency: 'BTC' }
        })
      });

      const data = await response.json();
      if (data.errors) {
        throw new Error(data.errors[0].message);
      }
      return data.data.accountDefaultWallet.id;
    }

    async function createInvoice(walletId, amountSats, memo) {
      const query = `
        mutation lnInvoiceCreateOnBehalfOfRecipient($input: LnInvoiceCreateOnBehalfOfRecipientInput!) {
          lnInvoiceCreateOnBehalfOfRecipient(input: $input) {
            invoice {
              paymentRequest
              paymentHash
            }
            errors {
              message
            }
          }
        }
      `;

      const response = await fetch(BLINK_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query,
          variables: {
            input: {
              recipientWalletId: walletId,
              amount: amountSats,
              memo: memo,
              expiresIn: 60
            }
          }
        })
      });

      const data = await response.json();
      
      if (data.errors) {
        throw new Error(data.errors[0].message);
      }
      
      if (data.data.lnInvoiceCreateOnBehalfOfRecipient.errors?.length) {
        throw new Error(data.data.lnInvoiceCreateOnBehalfOfRecipient.errors[0].message);
      }
      
      return data.data.lnInvoiceCreateOnBehalfOfRecipient.invoice;
    }

    async function checkPaymentStatus(paymentRequest) {
      const query = `
        query lnInvoicePaymentStatusByPaymentRequest($input: LnInvoicePaymentStatusByPaymentRequestInput!) {
          lnInvoicePaymentStatusByPaymentRequest(input: $input) {
            status
            paymentHash
          }
        }
      `;

      const response = await fetch(BLINK_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query,
          variables: {
            input: { paymentRequest }
          }
        })
      });

      const data = await response.json();
      if (data.errors) {
        throw new Error(data.errors[0].message);
      }
      return data.data.lnInvoicePaymentStatusByPaymentRequest.status;
    }

    function updatePaymentStatusUI(status) {
      paymentStatus.classList.remove('pending', 'paid', 'expired');
      expiredActions.classList.remove('visible');
      
      if (status === 'PAID') {
        paymentStatus.classList.add('paid');
        statusText.textContent = 'Payment received! Thank you!';
        if (statusPollingInterval) {
          clearInterval(statusPollingInterval);
          statusPollingInterval = null;
        }
      } else if (status === 'EXPIRED') {
        paymentStatus.classList.add('expired');
        statusText.textContent = 'This invoice has expired';
        expiredActions.classList.add('visible');
        if (statusPollingInterval) {
          clearInterval(statusPollingInterval);
          statusPollingInterval = null;
        }
      } else {
        paymentStatus.classList.add('pending');
        statusText.textContent = 'Waiting for payment...';
      }
    }

    async function startStatusPolling(paymentRequest) {
      if (statusPollingInterval) {
        clearInterval(statusPollingInterval);
      }
      
      paymentStatus.classList.add('visible');
      updatePaymentStatusUI('PENDING');

      const checkStatus = async () => {
        try {
          const status = await checkPaymentStatus(paymentRequest);
          updatePaymentStatusUI(status);
        } catch (error) {
          console.error('Status check failed:', error);
        }
      };

      await checkStatus();
      statusPollingInterval = setInterval(checkStatus, 3000);
    }

    async function handleDonate() {
      hideError();
      
      if (selectedAmount < 1) {
        showError('Please select or enter an amount');
        return;
      }

      donateBtn.disabled = true;
      donateBtn.innerHTML = '<span class="spinner"></span> Creating invoice...';

      try {
        let walletId = RECIPIENT_WALLET_ID;
        
        if (!walletId && RECIPIENT_USERNAME) {
          walletId = await resolveWalletId(RECIPIENT_USERNAME);
        }

        if (!walletId) {
          showError('Please configure RECIPIENT_WALLET_ID or RECIPIENT_USERNAME in the code');
          return;
        }

        const invoice = await createInvoice(walletId, selectedAmount, 'Lightning Donation');
        
        currentPaymentRequest = invoice.paymentRequest;
        invoiceText.textContent = invoice.paymentRequest;
        displayAmount.textContent = selectedAmount;
        
        qrCanvas.width = 200;
        qrCanvas.height = 200;
        QRCode.toCanvas(qrCanvas, invoice.paymentRequest, {
          width: 200,
          margin: 0,
          color: {
            dark: '#1a1a2e',
            light: '#ffffff'
          }
        });
        
        invoiceDisplay.classList.add('visible');
        startStatusPolling(invoice.paymentRequest);
        
      } catch (error) {
        showError(`Error: ${error.message}`);
      } finally {
        donateBtn.disabled = false;
        donateBtn.innerHTML = `
          <svg viewBox="0 0 24 24">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          Donate with Lightning
        `;
      }
    }

    function stopPolling() {
      if (statusPollingInterval) {
        clearInterval(statusPollingInterval);
        statusPollingInterval = null;
      }
      paymentStatus.classList.remove('visible');
      paymentStatus.classList.remove('pending', 'paid', 'expired');
      expiredActions.classList.remove('visible');
    }

    amountBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        amountBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedAmount = parseInt(btn.dataset.amount);
        customInput.value = '';
        hideError();
        invoiceDisplay.classList.remove('visible');
        currentPaymentRequest = '';
        stopPolling();
      });
    });

    customInput.addEventListener('input', (e) => {
      amountBtns.forEach(b => b.classList.remove('active'));
      selectedAmount = parseInt(e.target.value) || 0;
      hideError();
      invoiceDisplay.classList.remove('visible');
      currentPaymentRequest = '';
      stopPolling();
    });

    donateBtn.addEventListener('click', handleDonate);

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(currentPaymentRequest);
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch (err) {
        copyBtn.textContent = 'Failed';
        setTimeout(() => copyBtn.textContent = 'Copy', 2000);
      }
    });

    openWalletBtn.addEventListener('click', () => {
      window.location.href = `lightning:${currentPaymentRequest}`;
    });

    refreshStatusBtn.addEventListener('click', async () => {
      if (currentPaymentRequest) {
        try {
          const status = await checkPaymentStatus(currentPaymentRequest);
          updatePaymentStatusUI(status);
        } catch (error) {
          console.error('Status check failed:', error);
        }
      }
    });

    newInvoiceBtn.addEventListener('click', () => {
      handleDonate();
    });
  </script>
</body>
</html>
